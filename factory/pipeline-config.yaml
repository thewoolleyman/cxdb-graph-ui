goal: |
  Implement the CXDB Graph UI per the specification at `specification/` (intent, contracts, and constraints).

  The deliverables span `server/` (Rust) and `frontend/` (React + TypeScript):

  Rust server (`server/`):
  - `server/Cargo.toml` — Rust crate manifest with dependencies and [lints.clippy] ROP enforcement
  - `server/src/main.rs` — Thin binary entry point (CLI parsing, server startup)
  - `server/src/lib.rs` — Library crate declaring all public modules
  - `server/src/error.rs` — AppError enum with thiserror, AppResult<T> type alias
  - `server/src/config.rs` — Config struct with clap derives for CLI arguments
  - `server/src/server.rs` — axum router, route handlers
  - `server/src/dot_parser.rs` — DOT file parsing (nodes, edges, comments, normalization)
  - `server/src/cxdb_proxy.rs` — CXDB reverse proxy handler

  Frontend (`frontend/`):
  - `frontend/package.json` — pnpm v9 manifest with Vite, React 18, TypeScript (strict)
  - `frontend/src/` — React SPA source (components, hooks, lib, types)
  - `frontend/tests/` — Playwright E2E tests and Vitest unit tests
  - Vite builds into `server/assets/` (gitignored); Rust embeds via `include_dir`

  Workspace root:
  - `Cargo.toml` — Workspace root with [workspace] members = ["server"]
  - `Makefile` — Top-level build targets (build, test, clippy, fmt-check, ui-install, ui-build, ui-lint, ui-test-unit, ui-test-e2e, precommit)

  The server:
  - Accepts `--port`, `--cxdb` (repeatable), and `--dot` (repeatable) flags via clap
  - Serves frontend build output (embedded via `include_dir` crate)
  - Serves DOT files at `GET /dots/{name}` (read fresh each request)
  - Parses and serves node attributes at `GET /dots/{name}/nodes` (JSON)
  - Parses and serves edges at `GET /dots/{name}/edges` (JSON)
  - Reverse-proxies CXDB at `GET /api/cxdb/{index}/*`
  - Serves DOT file list at `GET /api/dots`
  - Serves CXDB instance list at `GET /api/cxdb/instances`

  The React SPA:
  - Renders DOT → SVG via @hpcc-js/wasm-graphviz (npm package, bundled by Vite)
  - Decodes msgpack via @msgpack/msgpack (npm package, bundled by Vite)
  - Polls CXDB every 3s for execution status and overlays colors onto SVG nodes
  - Shows a detail panel when a node is clicked
  - Supports multiple pipeline tabs

rules:
  - "After default_max_retry exhausted, route to a shape=hexagon human gate instead of failing"
  - "Human gate question must direct operator to /kilroy:status and .ai/postmortem_latest.md"
  - "Edge condition expressions MUST have spaces around operators, e.g. context.retry_count >= 3 not context.retry_count>=3"
  - "All fallible Rust functions must return Result<T, E> — no unwrap()/expect()/panic!() outside test code (enforced by Clippy lints in Cargo.toml)"
  - "Frontend must build before Rust: pnpm build outputs to server/assets/, then cargo build embeds via include_dir"
  - "TypeScript strict mode must be enabled (strict: true in tsconfig.json)"
  - "Rust code lives in server/ — lib.rs declares modules, main.rs is a thin entry point"
  - "Frontend code lives in frontend/ — React 18, TypeScript, Vite, Tailwind CSS v3, pnpm v9"

required_gates:
  - id: fix_fmt
    tool_command: "mise exec -- sh -c 'cd server && cargo fmt'"
    max_retries: 0
  - id: verify_fmt
    tool_command: "mise exec -- sh -c 'cd server && cargo fmt --check'"
    max_retries: 0
  - id: verify_clippy
    tool_command: "mise exec -- sh -c 'cd server && cargo clippy -- -D warnings -D clippy::unwrap_used -D clippy::expect_used -D clippy::panic -D clippy::unwrap_in_result'"
    timeout: "120s"
  - id: verify_ui_install
    tool_command: "mise exec -- sh -c 'cd frontend && pnpm install --frozen-lockfile'"
    timeout: "120s"
  - id: verify_ui_build
    tool_command: "mise exec -- sh -c 'cd frontend && pnpm build'"
    timeout: "120s"
  - id: verify_ui_lint
    tool_command: "mise exec -- sh -c 'cd frontend && pnpm lint'"
    timeout: "60s"
  - id: verify_ui_test_unit
    tool_command: "mise exec -- sh -c 'cd frontend && pnpm test:unit'"
    timeout: "120s"
  - id: verify_build
    tool_command: "mise exec -- sh -c 'cd server && cargo build'"
    timeout: "120s"
  - id: verify_tests
    tool_command: "mise exec -- sh -c 'cd server && cargo test'"
    timeout: "120s"
  - id: verify_e2e
    tool_command: "mise exec -- sh -c 'cd frontend && pnpm test:e2e'"
    timeout: "300s"

model_stylesheet: |
  * { llm_model: claude-sonnet-4-6; llm_provider: anthropic; max_tokens: 65536; }
  .hard { llm_model: claude-sonnet-4-6; llm_provider: anthropic; max_tokens: 65536; }
  .verify { llm_model: claude-sonnet-4-6; llm_provider: anthropic; max_tokens: 65536; }
