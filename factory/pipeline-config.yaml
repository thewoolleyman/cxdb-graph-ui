    shape: Mdiamond
  - id: exit
    shape: Msquare
  - id: implement
    shape: box
    class: hard
  - id: check_implement
    shape: diamond
  - id: fix_fmt
    shape: parallelogram
  - id: verify_fmt
    shape: parallelogram
  - id: check_fmt
    shape: diamond
  - id: verify_clippy
    shape: parallelogram
  - id: check_clippy
    shape: diamond
  - id: verify_ui_install
    shape: parallelogram
  - id: check_ui_install
    shape: diamond
  - id: verify_ui_build
    shape: parallelogram
  - id: check_ui_build
    shape: diamond
  - id: verify_ui_lint
    shape: parallelogram
  - id: check_ui_lint
    shape: diamond
  - id: verify_ui_test_unit
