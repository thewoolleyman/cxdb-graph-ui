target: cxdb-graph-ui
repo_path: .
output_dot: pipeline.dot

graph_id: cxdb_graph_ui_pipeline
graph_goal: "a Rust HTTP server and browser-based single-page application that renders Attractor pipeline DOT files as interactive SVGs with real-time CXDB execution status overlays, per all files under specification/ (intent, contracts, and constraints)"
topology: no-fanout
default_max_retry: 3
retry_target: implement
fallback_retry_target: postmortem

nodes:
  - id: start
    shape: Mdiamond
  - id: exit
    shape: Msquare
  - id: implement
    shape: box
    class: hard
  - id: check_implement
    shape: diamond
  - id: fix_fmt
    shape: parallelogram
  - id: verify_fmt
    shape: parallelogram
  - id: check_fmt
    shape: diamond
  - id: verify_clippy
    shape: parallelogram
  - id: check_clippy
    shape: diamond
  - id: verify_build
    shape: parallelogram
  - id: check_build
    shape: diamond
  - id: verify_tests
    shape: parallelogram
  - id: check_tests
    shape: diamond
  - id: verify_browser
    shape: box
    class: verify
  - id: review_final
    shape: box
    class: verify
    goal_gate: true
  - id: postmortem
    shape: box
  - id: human_gate
    shape: hexagon
    options: "Retry after manual fix,Abort pipeline"

edges:
  - from: start
    to: implement
  - from: implement
    to: check_implement
  - from: check_implement
    to: fix_fmt
    condition: "outcome = success"
  - from: check_implement
    to: implement
    condition: "outcome = fail && context.failure_class = transient_infra"
    loop_restart: true
  - from: check_implement
    to: postmortem
    condition: "outcome = fail && context.failure_class != transient_infra"
  - from: check_implement
    to: postmortem
  - from: fix_fmt
    to: verify_fmt
  - from: verify_fmt
    to: check_fmt
  - from: check_fmt
    to: verify_clippy
    condition: "outcome = success"
  - from: check_fmt
    to: postmortem
    condition: "outcome = fail && context.failure_class != transient_infra"
  - from: check_fmt
    to: postmortem
  - from: verify_clippy
    to: check_clippy
  - from: check_clippy
    to: verify_build
    condition: "outcome = success"
  - from: check_clippy
    to: postmortem
    condition: "outcome = fail && context.failure_class != transient_infra"
  - from: check_clippy
    to: postmortem
  - from: verify_build
    to: check_build
  - from: check_build
    to: verify_tests
    condition: "outcome = success"
  - from: check_build
    to: postmortem
    condition: "outcome = fail && context.failure_class != transient_infra"
  - from: check_build
    to: postmortem
  - from: verify_tests
    to: check_tests
  - from: check_tests
    to: verify_browser
    condition: "outcome = success"
  - from: check_tests
    to: postmortem
    condition: "outcome = fail && context.failure_class != transient_infra"
  - from: check_tests
    to: postmortem
  - from: verify_browser
    to: review_final
    condition: "outcome = success"
  - from: verify_browser
    to: implement
    condition: "outcome = fail && context.failure_class = transient_infra"
    loop_restart: true
  - from: verify_browser
    to: postmortem
    condition: "outcome = fail && context.failure_class != transient_infra"
  - from: verify_browser
    to: postmortem
  - from: review_final
    to: exit
    condition: "outcome = success"
  - from: review_final
    to: postmortem
    condition: "outcome = fail"
  - from: review_final
    to: postmortem
  - from: postmortem
    to: human_gate
  - from: human_gate
    to: implement
    label: "Retry"
  - from: human_gate
    to: exit
    label: "Abort"

goal: |
  Implement the CXDB Graph UI per the specification at `specification/` (intent, contracts, and constraints).

  The deliverables are in `server/`:
  - `server/Cargo.toml` — Rust crate manifest with dependencies and [lints.clippy] ROP enforcement
  - `server/src/main.rs` — Thin binary entry point (CLI parsing, server startup)
  - `server/src/lib.rs` — Library crate declaring all public modules
  - `server/src/error.rs` — AppError enum with thiserror, AppResult<T> type alias
  - `server/src/config.rs` — Config struct with clap derives for CLI arguments
  - `server/src/server.rs` — axum router, route handlers
  - `server/src/dot_parser.rs` — DOT file parsing (nodes, edges, comments, normalization)
  - `server/src/cxdb_proxy.rs` — CXDB reverse proxy handler
  - `server/assets/index.html` — Browser SPA (single HTML file, inline CSS/JS, CDN-loaded deps)
  - `Cargo.toml` — Workspace root with [workspace] members = ["server"]
  - `Makefile` — Top-level build targets (build, test, clippy, fmt-check, precommit)

  The server:
  - Accepts `--port`, `--cxdb` (repeatable), and `--dot` (repeatable) flags via clap
  - Serves `index.html` (embedded via `include_str!()`)
  - Serves DOT files at `GET /dots/{name}` (read fresh each request)
  - Parses and serves node attributes at `GET /dots/{name}/nodes` (JSON)
  - Parses and serves edges at `GET /dots/{name}/edges` (JSON)
  - Reverse-proxies CXDB at `GET /api/cxdb/{index}/*`
  - Serves DOT file list at `GET /api/dots`
  - Serves CXDB instance list at `GET /api/cxdb/instances`

  The browser SPA:
  - Renders DOT → SVG via @hpcc-js/wasm-graphviz (esm.sh CDN, pinned version)
  - Decodes msgpack via @msgpack/msgpack (jsDelivr CDN, pinned version)
  - Polls CXDB every 3s for execution status and overlays colors onto SVG nodes
  - Shows a detail panel when a node is clicked
  - Supports multiple pipeline tabs

rules:
  - "After default_max_retry exhausted, route to a shape=hexagon human gate instead of failing"
  - "Human gate question must direct operator to /kilroy:status and .ai/postmortem_latest.md"
  - "Edge condition expressions MUST have spaces around operators, e.g. context.retry_count >= 3 not context.retry_count>=3"
  - "All fallible Rust functions must return Result<T, E> — no unwrap()/expect()/panic!() outside test code (enforced by Clippy lints in Cargo.toml)"
  - "index.html must be a single file with inline CSS and JS — no npm, no bundler, no TypeScript, no framework"
  - "CDN URLs must be pinned to exact versions as specified in the spec (Section 4.1 and 4.1.1)"
  - "Rust code lives in server/ — lib.rs declares modules, main.rs is a thin entry point, index.html is in server/assets/"

required_gates:
  - id: fix_fmt
    tool_command: "mise exec -- sh -c 'cd server && cargo fmt'"
    max_retries: 0
  - id: verify_fmt
    tool_command: "mise exec -- sh -c 'cd server && cargo fmt --check'"
    max_retries: 0
  - id: verify_clippy
    tool_command: "mise exec -- sh -c 'cd server && cargo clippy -- -D warnings -D clippy::unwrap_used -D clippy::expect_used -D clippy::panic -D clippy::unwrap_in_result'"
    timeout: "120s"
  - id: verify_build
    tool_command: "mise exec -- sh -c 'cd server && cargo build'"
    timeout: "120s"
  - id: verify_tests
    tool_command: "mise exec -- sh -c 'cd server && cargo test'"
    timeout: "120s"

model_stylesheet: |
  * { llm_model: claude-sonnet-4-6; llm_provider: anthropic; max_tokens: 65536; }
  .hard { llm_model: claude-sonnet-4-6; llm_provider: anthropic; max_tokens: 65536; }
  .verify { llm_model: claude-sonnet-4-6; llm_provider: anthropic; max_tokens: 65536; }
