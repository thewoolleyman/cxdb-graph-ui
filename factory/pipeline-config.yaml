target: cxdb-graph-ui
repo_path: .
output_dot: pipeline.dot

graph_id: cxdb_graph_ui_pipeline
graph_goal: "a Rust HTTP server with a Vite + React 18 TypeScript frontend that renders Attractor pipeline DOT files as interactive SVGs with real-time CXDB execution status overlays, per all files under specification/ (intent, contracts, and constraints)"
topology: no-fanout
default_max_retry: 3
retry_target: implement
fallback_retry_target: postmortem

