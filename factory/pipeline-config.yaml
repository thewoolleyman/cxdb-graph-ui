  - id: check_build
    shape: diamond
  - id: verify_tests
    shape: parallelogram
  - id: check_tests
    shape: diamond
  - id: verify_e2e
    shape: parallelogram
  - id: check_e2e
    shape: diamond
  - id: review_final
