# Critic commands for the critique-revise loop.
#
# One critic per line. Blank lines and lines starting with # are ignored.
#
# Format:
#   skill:<model> <prompt>
#     Runs as a Claude Code Task subagent with the specified model.
#     Model values: opus, sonnet, haiku
#     The prompt is passed directly to the subagent.
#     {CRITIQUE_PROMPT} is replaced with the full critique prompt.
#
#   bash <command>
#     Runs the command via a Task subagent's Bash tool.
#     {CRITIQUE_PROMPT} is replaced with the full critique prompt.
#
# All critics run in parallel. The loop only converges when ALL critics
# agree there are no major issues.

skill:sonnet {CRITIQUE_PROMPT}
bash opencode run --agent build --model gitlab/duo-chat-gpt-5-codex --variant medium "execute the prompt in .claude/skills/spec-critique/SKILL.md"
